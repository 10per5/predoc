name: Build Hugo site
description: Build the Hugo SSG and copy the editor output into the site

inputs:
  baseurl:
    description: Hugo baseURL override
    required: false
    default: ""
  editor-url:
    description: Editor URL to inject into the Hugo output menu
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Trust cache step
      working-directory: hugo-view
      shell: bash
      run: predep --privileged 7f3af7065e69f620ec497824e9e9937e2d0aaeef6e0158bd8531b4dc5d7a02f9 cache

    - name: Cache Hugo binary
      uses: actions/cache@v4
      with:
        path: ~/.cache/predep
        key: hugo-binary-${{ hashFiles('hugo-view/predep.toml') }}

    - name: Hugo binary
      working-directory: hugo-view
      shell: bash
      run: predep hugo-binary

    - name: Cache Hugo theme
      uses: actions/cache@v4
      with:
        path: hugo-view/themes
        key: hugo-theme-${{ hashFiles('hugo-view/predep.toml') }}

    - name: Hugo theme
      working-directory: hugo-view
      shell: bash
      run: predep hugo-theme

    - name: Cache Hugo resources
      uses: actions/cache@v4
      with:
        path: hugo-view/resources
        key: hugo-resources-${{ hashFiles('hugo-view/predep.toml', 'hugo-view/hugo.toml', 'hugo-view/layouts/**', 'content/**') }}

    - name: Build Hugo site
      working-directory: hugo-view
      shell: bash
      env:
        HUGO_BASEURL: ${{ inputs.baseurl }}
        EDITOR_URL: ${{ inputs.editor-url }}
      run: predep --privileged 7f3af7065e69f620ec497824e9e9937e2d0aaeef6e0158bd8531b4dc5d7a02f9 hugo-build

    - name: Copy editor into site output
      shell: bash
      run: cp -r editor/public/. hugo-view/build/editor-live
