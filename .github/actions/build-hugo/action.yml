name: Build Hugo site
description: Build the Hugo SSG static site

inputs:
  baseurl:
    description: Hugo baseURL override
    required: false
    default: ""
  editor-url:
    description: Editor URL to inject into the Hugo output menu
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Trust cache step
      working-directory: hugo-view
      shell: bash
      run: predep --privileged 6e18cca1b29c239e8d21f5c60e15c465f51285f5343e5a36f82c84856f11c3da cache

    - name: Cache Hugo binary
      uses: actions/cache@v4
      with:
        path: ~/.cache/predep
        key: hugo-binary-${{ hashFiles('hugo-view/predep.toml') }}

    - name: Hugo binary
      working-directory: hugo-view
      shell: bash
      run: predep hugo-binary

    - name: Cache Hugo theme
      uses: actions/cache@v4
      with:
        path: hugo-view/themes
        key: hugo-theme-${{ hashFiles('hugo-view/predep.toml') }}

    - name: Hugo theme
      working-directory: hugo-view
      shell: bash
      run: predep hugo-theme

    - name: Cache Hugo resources
      uses: actions/cache@v4
      with:
        path: hugo-view/resources
        key: hugo-resources-${{ hashFiles('hugo-view/predep.toml', 'hugo-view/hugo.toml', 'hugo-view/layouts/**', 'content/**', '.github/actions/build-hugo/action.yml') }}

    - name: Build Hugo site
      working-directory: hugo-view
      shell: bash
      env:
        HUGO_BASEURL: ${{ inputs.baseurl }}
        EDITOR_URL: ${{ inputs.editor-url }}
      run: predep --privileged 6e18cca1b29c239e8d21f5c60e15c465f51285f5343e5a36f82c84856f11c3da build


