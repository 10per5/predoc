name: Build Windows GUI

on:
  push:
    branches: ["main"]
  workflow_dispatch:

defaults:
  run:
    shell: pwsh
    working-directory: gui

env:
  SAUCER_DIR: vendor\saucer
  SAUCER_COMMIT: 811cd2f8ee7044d7143fc8d36b9ceaaef878de39

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup MSVC command prompt
        uses: ilammy/msvc-dev-cmd@v1

      - name: Cache CMake
        id: cache-cmake
        uses: actions/cache@v4
        with:
          path: C:\cmake
          key: cmake-4.4.0-rc1

      - name: Install CMake (Saucer 8.2 needs >= 4.4)
        if: steps.cache-cmake.outputs.cache-hit != 'true'
        run: |
          Invoke-WebRequest -Uri 'https://github.com/Kitware/CMake/releases/download/v4.4.0-rc1/cmake-4.4.0-rc1-windows-x86_64.zip' -OutFile cmake.zip
          Expand-Archive cmake.zip -DestinationPath C:\cmake-tmp
          Move-Item C:\cmake-tmp\cmake-4.4.0-rc1-windows-x86_64 C:\cmake

      - name: Add CMake to PATH
        run: echo "C:\cmake\bin" >> $env:GITHUB_PATH

      - name: Install Ninja
        run: |
          Invoke-WebRequest -Uri 'https://github.com/ninja-build/ninja/releases/download/v1.12.1/ninja-win.zip' -OutFile ninja.zip
          Expand-Archive ninja.zip -DestinationPath C:\ninja
          echo "C:\ninja" >> $env:GITHUB_PATH

      - name: Install premake5
        run: |
          Invoke-WebRequest -Uri 'https://github.com/premake/premake-core/releases/download/v5.0.0-beta8/premake-5.0.0-beta8-windows.zip' -OutFile premake.zip
          Expand-Archive premake.zip -DestinationPath C:\premake5
          echo "C:\premake5" >> $env:GITHUB_PATH

      - name: Cache WebView2 SDK
        id: cache-wv2
        uses: actions/cache@v4
        with:
          path: C:\wv2
          key: webview2-1.0.3650.58

      - name: Cache Saucer source
        id: cache-saucer-src
        uses: actions/cache@v4
        with:
          path: C:\saucer-src
          key: saucer-src-${{ env.SAUCER_COMMIT }}

      - name: Cache Saucer build
        id: cache-saucer
        uses: actions/cache@v4
        with:
          path: gui\vendor\saucer
          key: saucer-windows-${{ env.SAUCER_COMMIT }}-${{ env.SAUCER_DIR }}

      - name: Install WebView2 SDK
        if: steps.cache-wv2.outputs.cache-hit != 'true'
        run: |
          Invoke-WebRequest -Uri 'https://www.nuget.org/api/v2/package/Microsoft.Web.WebView2/1.0.3650.58' -OutFile wv2.zip
          Expand-Archive wv2.zip -DestinationPath C:\wv2

      - name: Export WebView2 paths
        if: steps.cache-saucer.outputs.cache-hit != 'true'
        run: |
          echo "CMAKE_INCLUDE_PATH=C:\wv2\build\native\include" >> $env:GITHUB_ENV
          echo "CMAKE_LIBRARY_PATH=C:\wv2\build\native\x64" >> $env:GITHUB_ENV

      - name: Copy WebView2LoaderStatic.lib to vendor
        run: |
          $vendorLib = "$env:SAUCER_DIR\lib"
          New-Item -ItemType Directory -Force -Path $vendorLib | Out-Null
          if (Test-Path "C:\wv2\build\native\x64\WebView2LoaderStatic.lib") {
            Copy-Item "C:\wv2\build\native\x64\WebView2LoaderStatic.lib" "$vendorLib\" -Force
          } else {
            Write-Warning "WebView2LoaderStatic.lib not found at C:\wv2\build\native\x64"
          }

      - name: Build Saucer
        if: steps.cache-saucer.outputs.cache-hit != 'true'
        run: |
          if (-not (Test-Path C:\saucer-src\.git)) {
            git clone https://github.com/saucer/saucer.git C:\saucer-src
          }
          cd C:\saucer-src
          git fetch --depth 1 origin $env:SAUCER_COMMIT
          git checkout $env:SAUCER_COMMIT
          $absSaucerDir = Join-Path $env:GITHUB_WORKSPACE "gui\$env:SAUCER_DIR"
          cmake -B C:\saucer-build -G Ninja -S . `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_INSTALL_PREFIX="$absSaucerDir" `
            -DCMAKE_INCLUDE_PATH=$env:CMAKE_INCLUDE_PATH `
            -DCMAKE_LIBRARY_PATH=$env:CMAKE_LIBRARY_PATH `
            -Dsaucer_backend=WebView2 `
            -Dsaucer_static=ON `
            -Dsaucer_webview2_arch=x64 `
            -Dsaucer_prefer_remote=OFF
          cmake --build C:\saucer-build -j $env:NUMBER_OF_PROCESSORS
          New-Item -ItemType Directory -Force -Path "$absSaucerDir\lib", "$absSaucerDir\include" | Out-Null
          Copy-Item C:\saucer-src\include\* "$absSaucerDir\include\" -Recurse -Force
          foreach ($d in Get-ChildItem C:\saucer-build\_deps\*\include -Directory) { Copy-Item "$d\*" "$absSaucerDir\include\" -Recurse -Force }
          Copy-Item C:\saucer-build\saucer.lib "$absSaucerDir\lib\" -Force
          if (Test-Path "C:\saucer-build\_deps\coco-build\coco.lib") { Copy-Item "C:\saucer-build\_deps\coco-build\coco.lib" "$absSaucerDir\lib\" -Force }

      - name: Install predep
        run: |
          Invoke-WebRequest -Uri 'https://github.com/10per5/predep/releases/download/v0.0.1/predep-windows-x86_64.zip' -OutFile predep.zip
          Expand-Archive predep.zip -DestinationPath C:\predep
          echo "C:\predep" >> $env:GITHUB_PATH

      - name: Build predoc-gui
        run: |
          predep vendor
          premake5 vs2022
          msbuild predoc-gui.sln /p:Configuration=redist /p:Platform=x64 /m:$env:NUMBER_OF_PROCESSORS

      - name: Install bun
        run: |
          powershell -c "iwr bun.sh/install.ps1 -useb | iex"
          echo "$env:USERPROFILE\.bun\bin" >> $env:GITHUB_PATH

      - name: Build editor
        run: |
          predep --privileged 8b3575cc6ee390d2d388ac0677de168f511c3bbd0c9e9568378fde7db86c0622 build
        working-directory: editor

      - name: Package via predep
        run: |
          predep --privileged 942aeb72b04c747d837d96bd218a9fde88482254c32cb39be613d05bf28d3dc2 package
        working-directory: ${{ github.workspace }}

      - name: Read version
        id: version
        shell: pwsh
        run: |
          $ver = "dev"
          $msg = "${{ github.event.head_commit.message }}"
          if ($msg -match '^build\(v(\d+\.\d+\.\d+)\)') {
            $ver = "v$($matches[1])"
          }
          echo "version=$ver" >> $env:GITHUB_OUTPUT

      # - name: Upload artifact
      #   uses: actions/upload-artifact@v4
      #   with:
      #     name: predoc-windows-x64-${{ steps.version.outputs.version }}
      #     path: predoc-windows-x86_64.zip
      #     if-no-files-found: error

      - name: Create GitHub Release
        if: steps.version.outputs.version != 'dev'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: ${{ steps.version.outputs.version }}
          files: predoc-windows-x86_64.zip
          generate_release_notes: true
