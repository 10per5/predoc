main = "build-docker"
project = "predoc"

[[include]]
path = "editor/predep.toml"

[[include]]
path = "hugo-view/predep.toml"

[[include]]
path = "gui/predep.toml"

[[stages]]
name = "build"
description = "Build all subprojects"
type = "group"
depends = [
    "editor::editor-build",
    "hugo-view::hugo-build",
    "gui::gui-build",
]

[[stages]]
name = "build-docker"
description = "Build all subprojects via Docker"
type = "group"
depends = [
    "editor::editor-docker",
    "hugo-view::hugo-docker",
    "gui::gui-docker",
]

[[stages]]
name = "package"
description = "Assemble release archive"
type = "package"
bundle = "predoc"
depends = ["build"]
artifacts = [
    { source = "root://gui/bin/predoc-gui", dest = "predoc-gui" },
    { source = "root://editor/public", dest = "editor" },
]

[install]
dir = "/opt/predoc"
symlink = true
artifacts = [
  { source = "root://gui/bin/predoc-gui", dest = "predoc-gui" },
  { source = "root://editor/public/",      dest = "editor" },
  { source = "root://content",            dest = "content" },
  { source = "root://hugo-view/themes",   dest = "hugo/themes" },
  { source = "root://hugo-view/hugo.toml",dest = "hugo/hugo.toml" },
]
