baseURL = "/"
title = "predoc"
theme = "book"
contentDir = "../content"
disableKinds = ["RSS", "sitemap"]

[security]
  [security.funcs]
    getenv = ["^EDITOR_URL$", "^HUGO_", "^CI$"]

[params]
  BookSearch = true
  BookTheme = "auto"
  BookSection = "docs"
  description = "A markdown wiki with live WYSIWYG editing and static site export via Hugo Book."
